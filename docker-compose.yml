version: "3.9"
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: afisha
      POSTGRES_USER: afisha
      POSTGRES_PASSWORD: afisha
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro

volumes:
  pgdata:
